<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Venda</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="topbar">
    <div class="logo">SAAVEDRA MODAS</div>
    <div class="usuario">Victor Hugo</div>
</div>

<div class="container">

    <div class="menu">
        <a href="/home-page">🏠 Home</a>
        <a href="/lancamentos-page">💰 Nova Venda</a>
        <a href="/historico-page">📋 Histórico</a>
        <a href="/relatorios-page">📊 Relatórios</a>
        <a href="/fiados-page">🧾 Fiados</a>
        <a href="/canais-page">⚙️ Canais</a>
    </div>

    <div class="conteudo">
        <div class="card">

            <h1>Nova Venda</h1>

            <br>

            <label for="valor">Valor</label>
            <input id="valor" type="number" step="0.01" placeholder="0,00">

            <label for="data">Data</label>
            <input id="data" type="date"
                   th:value="${#temporals.format(#temporals.createToday(),'yyyy-MM-dd')}">

            <label for="canalRecebimentoId">Canal</label>
            <select id="canalRecebimentoId">
                <option th:each="canal : ${canais}"
                        th:value="${canal.id}"
                        th:text="${canal.nome}">
                </option>
            </select>

            <button onclick="salvarVenda()" class="btn-verde">
                Salvar Venda
            </button>

        </div>
    </div>

</div>

<!-- ================= MODAL RESULTADO ================= -->
<div id="modalResultado" class="modal">
    <div class="modal-box" style="text-align:center;">
        <div id="modalIcone" style="font-size:48px; margin-bottom:12px;"></div>
        <h2 id="modalTitulo" style="margin-bottom:8px;"></h2>
        <p id="modalMensagem" style="margin-bottom:24px;"></p>
        <button onclick="fecharModalResultado()">OK</button>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>

<script>
    async function salvarVenda() {

        const valorInput = document.getElementById("valor").value;

        if (!valorInput || parseFloat(valorInput) <= 0) {
            abrirModal("❌", "Valor inválido", "Informe um valor maior que zero.");
            return;
        }

        const venda = {
            valor: parseFloat(valorInput),
            data: document.getElementById("data").value,
            canalRecebimentoId: parseInt(document.getElementById("canalRecebimentoId").value)
        };

        const resposta = await apiFetch("/lancamentos", {
            method: "POST",
            body: JSON.stringify(venda)
        });

        if (!resposta) {
            return;
        }

        if (resposta.ok) {
            abrirModal("✅", "Venda cadastrada!", "A venda foi registrada com sucesso.");
            document.getElementById("valor").value = "";
        } else {
            let mensagemErro = "Não foi possível cadastrar a venda.";

            try {
                const erro = await resposta.json();
                mensagemErro = erro.erro || erro.message || mensagemErro;
            } catch (e) {
                mensagemErro = "Erro inesperado ao cadastrar a venda.";
            }

            abrirModal("❌", "Erro ao cadastrar", mensagemErro);
        }
    }

    function abrirModal(icone, titulo, mensagem) {
        document.getElementById("modalIcone").innerHTML = icone;
        document.getElementById("modalTitulo").innerHTML = titulo;
        document.getElementById("modalMensagem").innerHTML = mensagem;
        document.getElementById("modalResultado").style.display = "flex";
    }

    function fecharModalResultado() {
        document.getElementById("modalResultado").style.display = "none";
    }
</script>

</body>
</html>
