<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canais de Recebimento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="topbar">
    <div class="logo">SAAVEDRA MODAS</div>
    <div class="usuario">Victor Hugo / Ana Paula</div>
</div>

<div class="container">

    <div class="menu">
        <a href="/home-page">🏠 Home</a>
        <a href="/lancamentos-page">💰 Nova Venda</a>
        <a href="/historico-page">📋 Histórico</a>
        <a href="/relatorios-page">📊 Relatórios</a>
        <a href="/fiados-page">🧾 Fiados</a>
        <a href="/canais-page">⚙️ Canais</a>
    </div>

    <div class="conteudo">

        <div class="card">

            <h2>Canais de Recebimento</h2>

            <br>

            <label for="nomeCanal">Nome do Canal</label>
            <input
                    type="text"
                    id="nomeCanal"
                    placeholder="Ex.: PIX PagBank Paula">

            <button
                    class="btn-verde"
                    onclick="salvarCanal()">
                Salvar Canal
            </button>

            <br><br>

            <div class="tabela-wrapper">

                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Ações</th>
                    </tr>
                    </thead>

                    <tbody id="listaCanais"></tbody>
                </table>

            </div>

        </div>

    </div>

</div>

<!-- ================= MODAL EDITAR ================= -->
<div id="modalEditar" class="modal">

    <div class="modal-box">

        <h2>Editar Canal</h2>

        <label for="editarNome">Nome</label>
        <input
                type="text"
                id="editarNome">

        <div class="modal-botoes">
            <button
                    class="btn-cancelar"
                    onclick="fecharEditar()">
                Cancelar
            </button>

            <button
                    class="btn-confirmar"
                    onclick="salvarEdicao()">
                Salvar
            </button>
        </div>

    </div>

</div>

<div id="toast"></div>

<script th:src="@{/js/app.js}"></script>

<script>
    let idEditar = null;

    window.addEventListener("load", function () {
        protegerPagina();

        if (usuarioEstaLogado()) {
            listar();
        }
    });

    async function listar() {
        const resposta = await apiFetch("/canais");

        if (!resposta) {
            return;
        }

        if (!resposta.ok) {
            mostrarToast("❌ Erro ao carregar canais.");
            return;
        }

        const lista = await resposta.json();

        let html = "";

        if (lista.length === 0) {
            html = `
                <tr>
                    <td colspan="3">Nenhum canal cadastrado.</td>
                </tr>
            `;
        } else {
            lista.forEach(canal => {
                html += `
                    <tr>
                        <td>${canal.id}</td>
                        <td>${canal.nome}</td>
                        <td>
                            <button
                                    class="btn-editar"
                                    onclick="editar(${canal.id})">
                                ✏️
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById("listaCanais").innerHTML = html;
    }

    async function salvarCanal() {
        const nome = document.getElementById("nomeCanal").value.trim();

        if (nome === "") {
            mostrarToast("⚠️ Digite o nome do canal.");
            return;
        }

        const resposta = await apiFetch("/canais", {
            method: "POST",
            body: JSON.stringify({
                nome: nome
            })
        });

        if (!resposta) {
            return;
        }

        if (resposta.ok) {
            document.getElementById("nomeCanal").value = "";
            mostrarToast("✅ Canal salvo com sucesso.");
            listar();
        } else {
            mostrarToast("❌ Erro ao salvar canal.");
        }
    }

    async function editar(id) {
        idEditar = id;

        const resposta = await apiFetch("/canais/" + id);

        if (!resposta) {
            return;
        }

        if (!resposta.ok) {
            mostrarToast("❌ Erro ao buscar canal.");
            return;
        }

        const canal = await resposta.json();

        document.getElementById("editarNome").value = canal.nome;
        document.getElementById("modalEditar").style.display = "flex";
    }

    function fecharEditar() {
        document.getElementById("modalEditar").style.display = "none";
    }

    async function salvarEdicao() {
        const nome = document.getElementById("editarNome").value.trim();

        if (nome === "") {
            mostrarToast("⚠️ Digite o nome do canal.");
            return;
        }

        const resposta = await apiFetch("/canais/" + idEditar, {
            method: "PUT",
            body: JSON.stringify({
                nome: nome
            })
        });

        fecharEditar();

        if (!resposta) {
            return;
        }

        if (resposta.ok) {
            mostrarToast("✅ Canal atualizado com sucesso.");
            listar();
        } else {
            mostrarToast("❌ Erro ao atualizar canal.");
        }
    }

    function mostrarToast(texto) {
        const toast = document.getElementById("toast");

        toast.innerHTML = texto;
        toast.classList.add("mostrar");

        setTimeout(() => {
            toast.classList.remove("mostrar");
        }, 2500);
    }
</script>

</body>
</html>
